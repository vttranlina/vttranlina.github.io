<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="GitHub activity reports">
  <title>GitHub Activity Reports</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="github-activity-assets/style.css">
</head>
<body>
<header class="site-header">
  <div>
    <p class="eyebrow">Dark static dashboard</p>
    <h1>GitHub Activity Reports</h1>
    <p class="subtitle">Generated from local Markdown summaries. Newest reports are listed first.</p>
  </div>
  <label class="search">
    <span>Search</span>
    <input id="search" type="search" placeholder="booking, flaky, calendar...">
  </label>
</header>
<main class="layout">
  
  <section>
    <div class="section-title">
      <h2>Reports</h2>
      <span>0 total</span>
    </div>
    <div id="reports" class="report-list">
      <p class="empty">No reports found. Run ./run.sh first.</p>
    </div>
  </section>
</main>
<script>
const input = document.getElementById('search');
const cards = [...document.querySelectorAll('.report-card')];
input?.addEventListener('input', () => {
  const query = input.value.trim().toLowerCase();
  cards.forEach(card => {
    card.hidden = query && !card.dataset.search.includes(query);
  });
});
</script>
</body>
</html>
